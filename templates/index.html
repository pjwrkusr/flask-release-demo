<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_name }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f6f8fa;
      color: #222;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      max-width: 700px;
    }
    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ app_name }}</h1>
    <p>Version: <strong>{{ app_version }}</strong></p>
    <p>This is a sample Flask app for testing Jenkins packaging and release flow.</p>
    <ul>
      <li><code>/health</code> - health endpoint</li>
      <li><code>/version</code> - version endpoint</li>
    </ul>
  </div>
</body>
</html>
